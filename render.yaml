services:

  # ── Backend (FastAPI on Render Web Service) ────────────────────────────────
  - type: web
    name: gathari-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false               # paste your Neon connection string in the dashboard
      - key: JWT_SECRET
        generateValue: true       # Render generates a random secret automatically
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false               # set to your frontend URL after first deploy
                                  # e.g. https://gathari-frontend.onrender.com

  # ── Frontend (React SPA on Render Static Site) ────────────────────────────
  - type: web
    name: gathari-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html  # enable React Router client-side routing
    envVars:
      - key: VITE_API_BASE_URL
        sync: false               # set to your backend URL after first deploy
                                  # e.g. https://gathari-backend.onrender.com
